name: build-wasm
on:
  push:
    branches: [master]
jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: install c2w
        run: |
          curl -sSL https://github.com/ktock/container2wasm/releases/download/v0.8.4/container2wasm-v0.8.4-linux-amd64.tar.gz | tar -xz
          sudo mv c2w /usr/local/bin/c2w
      - name: build alpine wasm
        run: |
          printf 'FROM alpine:edge AS libs\nRUN apk add --no-cache libstdc++ libgcc\nFROM alpine:3.20\nCOPY --from=libs /usr/lib/libstdc++.so.6 /usr/lib/libstdc++.so.6\nCOPY --from=libs /usr/lib/libgcc_s.so.1 /usr/lib/libgcc_s.so.1\n' > Dockerfile
          docker build -t alpine-gcc15 .
          c2w --build-arg=WASI_NET=browser --build-arg=VM_MEMORY_SIZE_MB=512 alpine-gcc15 out.wasm
          ls -la out.wasm
      - name: patch wasm
        run: |
          node -e "
          const fs = require('fs');
          const buf = fs.readFileSync('out.wasm');
          let patches = 0;
          for (let i = 0; i < buf.length - 5; i++) {
            if (buf[i]===0x41 && buf[i+1]===0x80 && buf[i+2]===0x80 && buf[i+3]===0x02 && buf[i+4]===0x3b) {
              buf[i+1]=0xED; buf[i+2]=0x83; patches++;
            }
          }
          const brtable = [0x0e,0x06,0x01,0x02,0x00,0x05,0x04,0x03,0x06];
          for (let i = 0; i < buf.length - 80; i++) {
            let match = true;
            for (let j = 0; j < brtable.length; j++) if (buf[i+j]!==brtable[j]) { match=false; break; }
            if (!match) continue;
            for (let k = i; k < i + 80; k++) {
              if (buf[k]===0x41 && buf[k+1]===0x80 && buf[k+2]===0x80 && buf[k+3]===0x02 && buf[k+4]===0x72) {
                buf[k+1]=0xED; buf[k+2]=0x83; patches++; break;
              }
            }
          }
          fs.writeFileSync('out.wasm', buf);
          console.log('applied', patches, 'OPFS execute permission patches');
          "
      - name: split wasm
        run: |
          rm -f containers/nodejs*.wasm
          split -b 50M -a 2 -d out.wasm nodejs_chunk_
          for f in nodejs_chunk_??; do mv "$f" "containers/$(echo $f | sed 's/nodejs_chunk_/nodejs/').wasm"; done
          COUNT=$(ls containers/nodejs*.wasm | wc -l)
          HASH=$(sha256sum containers/nodejs*.wasm | sha256sum | cut -d' ' -f1)
          echo "$COUNT $HASH" > containers/nodejs.chunks
          rm -f out.wasm
      - name: commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin master
          git reset --soft origin/master
          git restore --staged .
          git add containers/nodejs*.wasm containers/nodejs.chunks
          git diff --cached --quiet || git commit -m "build: alpine WASM chunks"
          git push origin HEAD:master
